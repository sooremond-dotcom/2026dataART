<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>작업 노트 · 데이터의 눈</title>
<link rel="stylesheet" href="css/site.css" />
</head>
<body>
<div id="app-header"></div>
<div class="wrap narrow">
  <div class="page-head">
    <span class="eyebrow">작업 노트</span>
    <h1>과정·버전·성찰 — 곧 포트폴리오</h1>
    <p>저장한 작업과 메모가 시간순으로 쌓입니다. ‘AI가 도운 것 / 내가 결정한 것’을 나눠 적어 발표에 쓰세요.</p>
  </div>
  <div id="idea"></div>

  <div class="card">
    <h3>새 성찰 기록</h3>
    <div class="grid c2">
      <div><label class="field">🤖 AI(알고리즘)가 도운 것</label><textarea id="r-ai" rows="3" placeholder="예: K-means가 색을 8개로 요약"></textarea></div>
      <div><label class="field">🙋 내가 결정한 것</label><textarea id="r-me" rows="3" placeholder="예: K=5 선택, 소리에 폭발 규칙 설계"></textarea></div>
    </div>
    <label class="field">한 줄 성찰 (오늘 배운 것 / 바꾼 것과 이유)</label>
    <input id="r-line" type="text" placeholder="예: K를 줄였더니 분위기가 단순해져 의도에 더 맞았다">
    <button id="btn-save" class="btn primary" style="margin-top:10px">성찰 저장</button>
  </div>

  <h2 style="margin:22px 0 10px">기록 타임라인</h2>
  <div id="timeline"></div>
  <p class="footer-note" id="who"></p>
</div>

<script src="js/explain.js"></script>
<script src="js/guide.js"></script>
<script src="js/auth.js"></script>
<script src="config/cloud-config.js"></script>
<script src="js/store.js"></script>
<script src="js/ui.js"></script>
<script>
  const KIND = { color: '색 군집', data: '데이터 점', lab: '분석실', reflection: '성찰', project: '프로젝트' };
  const u = Auth.current();
  document.getElementById('who').textContent = u ? `${u.display} 님의 기록` : '로그인하면 내 기록이 보여요.';

  async function render() {
    if (!u) { document.getElementById('timeline').innerHTML = UI.callout('로그인하면 저장한 작업과 성찰이 시간순으로 모여요. <a href="index.html?next=notes.html">로그인</a>', 'info'); return; }
    const notes = await Store.listNotes(u.userId);
    const works = await Store.listWorks({ userId: u.userId });
    const items = [...notes.map(n => ({ t: n.updatedAt, type: 'note', d: n })), ...works.map(w => ({ t: w.updatedAt, type: 'work', d: w }))]
      .sort((a, b) => b.t - a.t);
    if (!items.length) { document.getElementById('timeline').innerHTML = '<p class="muted">아직 기록이 없어요. 스튜디오·분석실에서 저장해 보세요.</p>'; return; }
    document.getElementById('timeline').innerHTML = items.map(it => {
      const when = new Date(it.t).toLocaleString('ko-KR');
      if (it.type === 'work') {
        const w = it.d;
        return `<div class="card" style="margin-bottom:12px"><div style="display:flex;gap:12px">
          ${w.thumb ? `<img src="${w.thumb}" style="width:90px;height:68px;object-fit:cover;border-radius:8px;border:1px solid var(--line)">` : ''}
          <div><span class="badge good">${KIND[w.kind]||w.kind}${w.exhibited?' · 전시됨':''}</span>
          <h4 style="margin:6px 0 2px">${UI.escapeHTML(w.title||'작품')}</h4>
          <p class="muted" style="font-size:12px;margin:0">${when}</p>
          ${w.intent?`<p style="font-size:13px;margin:6px 0 0">의도: ${UI.escapeHTML(w.intent)}</p>`:''}</div></div></div>`;
      }
      const n = it.d;
      let inner = '';
      if (n.memos) inner = Object.entries(n.memos).map(([k, v]) => `<b>${k}</b>: ${UI.escapeHTML(v)}`).join('<br>');
      else inner = `${n.aiHelp?`🤖 ${UI.escapeHTML(n.aiHelp)}<br>`:''}${n.myDecision?`🙋 ${UI.escapeHTML(n.myDecision)}<br>`:''}${n.line?UI.escapeHTML(n.line):''}`;
      return `<div class="card" style="margin-bottom:12px"><span class="badge">${KIND[n.kind]||n.kind}</span>
        <h4 style="margin:6px 0 2px">${UI.escapeHTML(n.title||'성찰')}</h4>
        <p class="muted" style="font-size:12px;margin:0 0 6px">${when}</p>
        <div style="font-size:13.3px;line-height:1.6">${inner||'<span class="muted">내용 없음</span>'}</div></div>`;
    }).join('');
  }

  document.getElementById('btn-save').addEventListener('click', async () => {
    if (!u) { UI.toast('로그인이 필요합니다.'); setTimeout(()=>location.href='index.html?next=notes.html',800); return; }
    const ai = document.getElementById('r-ai').value.trim(), me = document.getElementById('r-me').value.trim(), line = document.getElementById('r-line').value.trim();
    if (!ai && !me && !line) { UI.toast('내용을 입력하세요.'); return; }
    await Store.saveNote({ userId: u.userId, by: u.display, kind: 'reflection', title: '성찰 기록', aiHelp: ai, myDecision: me, line });
    document.getElementById('r-ai').value = document.getElementById('r-me').value = document.getElementById('r-line').value = '';
    UI.toast('성찰을 저장했습니다.'); render();
  });
  UI.mountIdeaBar('idea', 'notes'); render();
</script>
</body>
</html>
